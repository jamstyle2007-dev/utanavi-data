name: monthly-song-update

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: latest songs
        run: python3 update_songs.py | tee summary.txt

      - name: validate
        run: |
          python3 - <<'PY'
          import json
          d = json.load(open("songs.json", encoding="utf-8"))
          assert isinstance(d, list) and len(d) >= 3000, f"songs.json invalid: {len(d)}"
          ids = [s["id"] for s in d]
          assert len(ids) == len(set(ids)), "duplicate id"
          print("validate OK:", len(d))
          PY

      - name: commit & push
        run: |
          if git diff --quiet songs.json; then echo "no change"; exit 0; fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add songs.json
          git commit -m "chore: monthly song update $(date +%F)"
          git push
